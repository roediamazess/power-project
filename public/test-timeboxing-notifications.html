<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Boxing Notification Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #notification-container {
            position: fixed;
            top: 5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            pointer-events: none;
        }
        
        .notification-capsule {
            transform-origin: top center;
            animation: emerge-from-logo 0.5s cubic-bezier(0.21, 1.02, 0.73, 1) forwards;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
            max-width: 400px;
            min-width: 300px;
            border-radius: 9999px;
            padding: 0.5rem 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .notification-capsule:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        @keyframes emerge-from-logo {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.6);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .notification-capsule.hide {
            animation: fade-out 0.4s ease-in forwards;
        }
        
        @keyframes fade-out {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.6);
            }
        }
        
        .progress-line {
            height: 2px;
            animation: shrink 4.5s linear forwards;
            border-radius: 1px;
        }
        
        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }
        
        .notification-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .notification-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .notification-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        
        .notification-info {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        
        .notification-create {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }
        
        .notification-update {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
        }
        
        .notification-delete {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Time Boxing Notification Test</h1>
        <p class="text-gray-600 mb-8">Testing the same notification system used in Time Boxing page</p>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="testTimeBoxingNotifications()" 
                    class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg">
                Test Time Boxing Notifications
            </button>
            
            <button onclick="showNotification('Time Boxing created successfully', 'create')" 
                    class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-6 rounded-lg">
                Create Time Boxing
            </button>
            
            <button onclick="showNotification('Time Boxing updated successfully', 'update')" 
                    class="bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-6 rounded-lg">
                Update Time Boxing
            </button>
            
            <button onclick="showNotification('Time Boxing deleted successfully', 'delete')" 
                    class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-lg">
                Delete Time Boxing
            </button>
        </div>
    </div>
    
    <div id="notification-container"></div>
    
    <script>
        function showNotification(message, type = 'info') {
            console.log('🔔 showNotification called:', message, type);
            
            // Create container if not exists
            if (!document.getElementById('notification-container')) {
                console.log('📦 Creating notification container');
                const container = document.createElement('div');
                container.id = 'notification-container';
                container.style.cssText = `
                    position: fixed;
                    top: 5rem;
                    left: 1.5rem;
                    z-index: 1000;
                    display: flex;
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 0.75rem;
                    pointer-events: none;
                `;
                document.body.appendChild(container);
            }
            
            const container = document.getElementById('notification-container');
            console.log('📦 Container found:', container);
            
            // Create notification element
            const notification = document.createElement('div');
            notification.className = `notification-capsule notification-${type}`;
            notification.style.cssText = `
                transform-origin: top left;
                animation: emerge-from-logo 0.5s cubic-bezier(0.21, 1.02, 0.73, 1) forwards;
                pointer-events: auto;
                cursor: pointer;
                transition: all 0.3s ease;
                max-width: 400px;
                min-width: 300px;
                border-radius: 9999px;
                padding: 0.5rem 1rem;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                background: ${getNotificationBg(type)};
                color: white;
            `;
            
            notification.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <div style="background: rgba(255, 255, 255, 0.2); border-radius: 50%; width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center; margin-right: 0.75rem;">
                        ${getIcon(type)}
                    </div>
                    <div style="flex: 1; padding: 0 0.75rem; display: flex; flex-direction: column;">
                        <p style="font-size: 0.875rem; font-weight: 500; line-height: 1.25; margin: 0;">${message}</p>
                        <div style="height: 2px; background: ${getProgressColor(type)}; margin-top: 0.25rem; border-radius: 1px; animation: shrink 4.5s linear forwards;"></div>
                    </div>
                </div>
            `;
            
            // Add click to close
            notification.addEventListener('click', () => {
                notification.style.animation = 'fade-out 0.4s ease-in forwards';
                setTimeout(() => notification.remove(), 400);
            });
            
            container.appendChild(notification);
            console.log('✅ Notification added to container');
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.style.animation = 'fade-out 0.4s ease-in forwards';
                    setTimeout(() => notification.remove(), 400);
                }
            }, 5000);
        }
        
        function getIcon(type) {
            const icons = {
                success: '✓',
                error: '✕',
                warning: '⚠',
                info: 'ℹ',
                create: '+',
                update: '↻',
                delete: '🗑'
            };
            return icons[type] || icons.info;
        }
        
        function getNotificationBg(type) {
            const colors = {
                success: 'linear-gradient(135deg, #10b981, #059669)',
                error: 'linear-gradient(135deg, #ef4444, #dc2626)',
                warning: 'linear-gradient(135deg, #f59e0b, #d97706)',
                info: 'linear-gradient(135deg, #3b82f6, #2563eb)',
                create: 'linear-gradient(135deg, #8b5cf6, #7c3aed)',
                update: 'linear-gradient(135deg, #06b6d4, #0891b2)',
                delete: 'linear-gradient(135deg, #f97316, #ea580c)'
            };
            return colors[type] || colors.info;
        }
        
        function getProgressColor(type) {
            const colors = {
                success: '#10b981',
                error: '#ef4444',
                warning: '#f59e0b',
                info: '#3b82f6',
                create: '#8b5cf6',
                update: '#06b6d4',
                delete: '#f97316'
            };
            return colors[type] || colors.info;
        }
        
        function testTimeBoxingNotifications() {
            showNotification('Time Boxing page loaded successfully', 'info');
            setTimeout(() => showNotification('This is a success notification', 'success'), 1000);
            setTimeout(() => showNotification('This is a create notification', 'create'), 2000);
        }
        
        // Auto test on load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, testing notification...');
            setTimeout(() => {
                showNotification('Time Boxing notification test loaded!', 'info');
            }, 1000);
        });
    </script>
</body>
</html>
