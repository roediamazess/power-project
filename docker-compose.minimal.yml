services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: powerpro/laravel:latest
    container_name: powerpro-app
    restart: unless-stopped
    environment:
      APP_NAME: "PowerPro"
      APP_ENV: production
      APP_KEY: base64:bQbZtzP6/Ybsc+BjYjBz/lSr+4JxH2GvzLcsX6Vz0wo=
      APP_DEBUG: false
      APP_URL: http://powerpro.cloud
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: powerpro_production
      DB_USERNAME: powerpro_user
      DB_PASSWORD: powerpro_password
      REDIS_HOST: redis
      REDIS_PASSWORD: redis_password
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    working_dir: /var/www
    volumes:
      - ./:/var/www:delegated
    networks:
      - app-network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: powerpro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www:delegated
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - app-network
    depends_on:
      - app

  db:
    image: postgres:14-alpine
    container_name: powerpro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: powerpro_production
      POSTGRES_USER: powerpro_user
      POSTGRES_PASSWORD: powerpro_password
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: powerpro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis-data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local



